name: Rakuten Blog Auto Post

on:
  schedule:
    # 8:30 JST = 23:30 UTC (previous day)
    - cron: '30 23 * * *'
    # 13:30 JST = 04:30 UTC
    - cron: '30 4 * * *'
    # 20:30 JST = 11:30 UTC
    - cron: '30 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@latest

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Decode cookies
        run: echo "$RAKUTEN_COOKIES" | base64 -d > rakuten_cookies.json
        env:
          RAKUTEN_COOKIES: ${{ secrets.RAKUTEN_COOKIES }}

      - name: Run upload
        env:
          RAKUTEN_USER_ID: ${{ secrets.RAKUTEN_USER_ID }}
          RAKUTEN_PASSWORD: ${{ secrets.RAKUTEN_PASSWORD }}
          RAKUTEN_BLOG_ID: ${{ secrets.RAKUTEN_BLOG_ID }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python upload.py

      - name: Commit uploaded.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uploaded.json
          git diff --cached --quiet || git commit -m "Update uploaded.json [skip ci]"
          git push

      - name: Save debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_*.png
          overwrite: true
