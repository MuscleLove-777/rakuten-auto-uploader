name: Rakuten Blog Auto Post

on:
  schedule:
    # 毎日 JST 12:00 (UTC 3:00)
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@latest

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Decode cookies
        run: echo "$RAKUTEN_COOKIES" | base64 -d > rakuten_cookies.json
        env:
          RAKUTEN_COOKIES: ${{ secrets.RAKUTEN_COOKIES }}

      - name: Run upload (attempt 1)
        id: attempt1
        continue-on-error: true
        env:
          RAKUTEN_USER_ID: ${{ secrets.RAKUTEN_USER_ID }}
          RAKUTEN_PASSWORD: ${{ secrets.RAKUTEN_PASSWORD }}
          RAKUTEN_BLOG_ID: ${{ secrets.RAKUTEN_BLOG_ID }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python upload.py

      - name: Wait before retry 2
        if: steps.attempt1.outcome == 'failure'
        run: echo "Attempt 1 failed. Waiting 60s..." && sleep 60

      - name: Run upload (attempt 2)
        id: attempt2
        if: steps.attempt1.outcome == 'failure'
        continue-on-error: true
        env:
          RAKUTEN_USER_ID: ${{ secrets.RAKUTEN_USER_ID }}
          RAKUTEN_PASSWORD: ${{ secrets.RAKUTEN_PASSWORD }}
          RAKUTEN_BLOG_ID: ${{ secrets.RAKUTEN_BLOG_ID }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python upload.py

      - name: Wait before retry 3
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
        run: echo "Attempt 2 failed. Waiting 120s..." && sleep 120

      - name: Run upload (attempt 3)
        id: attempt3
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
        env:
          RAKUTEN_USER_ID: ${{ secrets.RAKUTEN_USER_ID }}
          RAKUTEN_PASSWORD: ${{ secrets.RAKUTEN_PASSWORD }}
          RAKUTEN_BLOG_ID: ${{ secrets.RAKUTEN_BLOG_ID }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: python upload.py

      - name: Commit uploaded.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uploaded.json
          git diff --cached --quiet || git commit -m "Update uploaded.json [skip ci]"
          git push

      - name: LINE notify on failure
        if: steps.attempt1.outcome == 'failure' && (steps.attempt2.outcome == 'failure' || steps.attempt2.outcome == 'skipped') && (steps.attempt3.outcome == 'failure' || steps.attempt3.outcome == 'skipped')
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          curl -s -X POST https://api.line.me/v2/bot/message/push \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${LINE_CHANNEL_TOKEN}" \
            -d "{
              \"to\": \"${LINE_USER_ID}\",
              \"messages\": [{
                \"type\": \"text\",
                \"text\": \"⚠️ 楽天ブログ自動投稿が3回リトライしても失敗しました\\n\\n時刻: $(TZ=Asia/Tokyo date +%Y-%m-%d\ %H:%M\ JST)\\nログ: https://github.com/MuscleLove-777/rakuten-auto-uploader/actions/runs/${{ github.run_id }}\"
              }]
            }"

      - name: LINE notify on success
        if: steps.attempt1.outcome == 'success' || steps.attempt2.outcome == 'success' || steps.attempt3.outcome == 'success'
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          RETRY_INFO=""
          if [ "${{ steps.attempt2.outcome }}" = "success" ]; then RETRY_INFO="（2回目で成功）"; fi
          if [ "${{ steps.attempt3.outcome }}" = "success" ]; then RETRY_INFO="（3回目で成功）"; fi
          curl -s -X POST https://api.line.me/v2/bot/message/push \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${LINE_CHANNEL_TOKEN}" \
            -d "{
              \"to\": \"${LINE_USER_ID}\",
              \"messages\": [{
                \"type\": \"text\",
                \"text\": \"✅ 楽天ブログ自動投稿 成功${RETRY_INFO}\\n時刻: $(TZ=Asia/Tokyo date +%Y-%m-%d\ %H:%M\ JST)\"
              }]
            }"

      - name: Save debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_*.png
          overwrite: true
